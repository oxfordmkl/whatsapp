<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Password | Oxford CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --green: #238636;
      --green-hover: #2ea043;
      --danger: #f85149;
    }
    body {
      margin: 0; padding: 0;
      background: var(--bg-main); color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-container {
      width: 100%; max-width: 400px;
      padding: 2rem;
    }
    .auth-brand {
      text-align: center; margin-bottom: 2rem;
    }
    .auth-brand-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--green); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem;
    }
    .auth-title { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    .auth-subtitle { font-size: 0.9rem; color: var(--text-muted); }
    
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: #fff; }
    input {
      width: 100%; padding: 0.65rem 0.875rem;
      background: var(--bg-main); border: 1px solid var(--border);
      border-radius: 6px; color: #fff; font-family: inherit; font-size: 0.95rem;
      box-sizing: border-box; transition: all 0.2s;
    }
    input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(35,134,54,0.3); }
    
    .btn-submit {
      width: 100%; padding: 0.75rem;
      background: var(--green); color: #fff;
      border: none; border-radius: 6px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: var(--green-hover); }
    
    .alert {
      padding: 0.75rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1rem;
    }
    .alert-danger { background: rgba(248,81,73,0.1); color: var(--danger); border: 1px solid rgba(248,81,73,0.4); }
    .alert-warning { background: rgba(210,153,34,0.1); color: #d29922; border: 1px solid rgba(210,153,34,0.4); }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="auth-brand-icon">O</div>
      <div class="auth-title">Setup Password</div>
      <div class="auth-subtitle">Welcome! Please secure your account by setting a new password.</div>
    </div>

    <div class="auth-card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('admin.crm_setup_password') }}">
        <div class="form-group">
          <label for="new_password">New Password</label>
          <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="Enter at least 6 characters">
        </div>
        
        <button type="submit" class="btn-submit">
          <i class="bi bi-shield-lock me-2"></i> Save and Continue
        </button>
      </form>
    </div>
    
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.8rem;">
      <a href="{{ url_for('admin.crm_logout') }}" style="color: var(--text-muted); text-decoration: none;"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </div>
  </div>

</body>
</html>
