<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford CRM - Resend Verification Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #010409; color: #c9d1d9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; width: 100%; max-width: 400px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h2 { font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
        .form-control { background: #010409; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; padding: 0.75rem 1rem; }
        .form-control:focus { background: #010409; border-color: #58a6ff; color: #c9d1d9; box-shadow: 0 0 0 3px rgba(88,166,255,0.3); }
        .btn-primary { background: #238636; border: 1px solid rgba(240,246,252,0.1); color: #fff; font-weight: 600; padding: 0.75rem; border-radius: 6px; width: 100%; }
        .btn-primary:hover { background: #2ea043; border-color: rgba(240,246,252,0.1); }
        .alert { border-radius: 6px; font-size: 0.9rem; padding: 0.75rem; border: 1px solid transparent; }
        .alert-danger { background: rgba(248,81,73,0.1); border-color: rgba(248,81,73,0.4); color: #ff7b72; }
        .alert-info { background: rgba(88,166,255,0.1); border-color: rgba(88,166,255,0.4); color: #79c0ff; }
        .alert-warning { background: rgba(210,153,34,0.1); border-color: rgba(210,153,34,0.4); color: #d29922; }
        .alert-success { background: rgba(46,160,67,0.1); border-color: rgba(46,160,67,0.4); color: #2ea043; }
        .footer-text { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: #8b949e; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2>Oxford CRM</h2>
            <p class="text-muted small">Resend Verification Email</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('public.resend_verification') }}" method="POST">
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Email address</label>
                <input type="email" name="email" class="form-control" placeholder="name@company.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary mb-3">Send Verification Email</button>
            <div class="text-center">
                <a href="/crm/login" class="small text-decoration-none" style="color: #58a6ff;">Back to Login</a>
            </div>
        </form>
        
        <div class="footer-text">
            &copy; 2026 Oxford CRM System
        </div>
    </div>
</body>
</html>
